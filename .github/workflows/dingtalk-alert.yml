name: DingTalk Alert

on:
  workflow_run:
    workflows:
      - "Uptime CI"
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send DingTalk Notification
        run: |
          curl "${{ secrets.NOTIFICATION_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "msgtype": "markdown",
            "markdown": {
              "title": "Upptime Alert",
              "text": "## 🚨 Upptime 监控告警\n请查看 GitHub Issues 获取详情"
            }
          }'
