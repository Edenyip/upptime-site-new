name: DingTalk Alert

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Check latest issues and send alert
        run: |
          ISSUES=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues?state=open\&per_page=5)

          echo "$ISSUES" | grep -q "is down" || exit 0

          curl "${{ secrets.NOTIFICATION_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "title": "Upptime Alert",
                "text": "## 🚨 监控告警\n\n检测到站点异常，请查看 GitHub Issues"
              }
            }'
