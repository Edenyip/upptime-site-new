name: DingTalk Alert

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send DingTalk Notification
        run: |
          curl "${{ secrets.NOTIFICATION_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "title": "Upptime Alert",
                "text": "## 🚨 Upptime 监控告警\n\n- Title: ${{ github.event.issue.title }}\n- URL: ${{ github.event.issue.html_url }}\n- Time: '"$(date '+%Y-%m-%d %H:%M:%S')"'
              }
            }'
